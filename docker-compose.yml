version: '3'

networks:
  fictadvisor:
    external: true
  fictadvisor-dev:
    external: true

services:
  fictadvisor-api-dev:
    image: fictadvisor/fictadvisor-api:dev
    container_name: fictadvisor-api-dev
    restart: unless-stopped
    volumes:
      - ~/static/fictadvisor-api-dev:/app/static
      - ~/private:/app/private
    depends_on:
      - postgres-db-dev
      - watchtower
    networks:
      - fictadvisor-dev
    ports:
      - "4001:80"
    env_file:
      - ~/deployment/env/fictadvisor-api-dev.env

  fictadvisor-api:
    image: fictadvisor/fictadvisor-api:master
    container_name: fictadvisor-api
    restart: unless-stopped
    volumes:
      - ~/static/fictadvisor-api:/app/static
      - ~/private:/app/private
    depends_on:
      - postgres-db
      - watchtower
    networks:
      - fictadvisor
    ports:
      - "3001:80"
    env_file:
      - ~/deployment/env/fictadvisor-api.env

  fictadvisor-web-dev:
    image: fictadvisor/fictadvisor-web:dev
    container_name: fictadvisor-web-dev
    restart: unless-stopped
    depends_on:
      - fictadvisor-api-dev
    networks:
      - fictadvisor-dev
    ports:
      - "4000:80"

  fictadvisor-web:
    image: fictadvisor/fictadvisor-web:master
    container_name: fictadvisor-web
    restart: unless-stopped
    depends_on:
      - fictadvisor-api
    networks:
      - fictadvisor
    ports:
      - "3000:80"

  fictadvisor-bot-dev:
    image: fictadvisor/fictadvisor-bot:dev
    container_name: fictadvisor-bot-dev
    restart: unless-stopped
    depends_on:
      - fictadvisor-api-dev
    networks:
      - fictadvisor-dev
    ports:
      - "4002:8000"
    env_file:
      - ~/deployment/env/fictadvisor-bot-dev.env

  fictadvisor-bot:
    image: fictadvisor/fictadvisor-bot:master
    container_name: fictadvisor-bot
    restart: unless-stopped
    depends_on:
      - fictadvisor-api
    networks:
      - fictadvisor
    ports:
      - "3002:8000"
    env_file:
      - ~/deployment/env/fictadvisor-bot.env

  postgres-db-dev:
    image: postgres:15
    container_name: postgres-db-dev
    volumes:
      - ~/deployment/development/postgres-db/data:/var/lib/postgresql/data
    ports:
      - "4003:5432"
    networks:
      - fictadvisor-dev
    env_file:
      - ~/deployment/env/postgres-dev.env

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    volumes:
      - ~/postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fictadvisor
    env_file:
      - ~/deployment/env/postgres.env

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - ~/minio/data:/data
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # web console
    networks:
      - fictadvisor
      - fictadvisor-dev
    env_file:
      - ~/deployment/env/minio.env

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - "--cleanup"
      - "-i"
      - "60"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    depends_on:
      - postgres-db
    env_file:
      - ~/deployment/env/postgres-exporter.env
    networks:
      - fictadvisor

  postgres-exporter-dev:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-dev
    restart: unless-stopped
    depends_on:
      - postgres-db-dev
    env_file:
      - ~/deployment/env/postgres-exporter-dev.env
    networks:
      - fictadvisor-dev

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    networks:
      - fictadvisor
      - fictadvisor-dev

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    env_file:
      - ~/deployment/env/grafana.env
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3300:3000"
    networks:
      - fictadvisor

volumes:
  prometheus-data:
  grafana-data:
