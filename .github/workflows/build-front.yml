name: Build Front-end

on:
  pull_request:
    branches:
      - 'dev'
      - 'master'
    paths:
      - 'fictadvisor-web/**'
      - '.github/**'

env:
  IMAGE: fictadvisor/fictadvisor-web

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build app Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./fictadvisor-web/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            NODE_ENV=${{ github.base_ref == 'master' && 'production' || 'development' }}
          cache-from: type=gha,scope=web-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=web-${{ matrix.arch }}
